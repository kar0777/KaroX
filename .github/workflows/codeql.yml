name: CodeQL

on:
  pull_request:
    paths:
      - "server/**/*.py"
      - "scripts/**/*.py"
      - ".github/workflows/codeql.yml"
  push:
    branches: [main]
    paths:
      - "server/**/*.py"
      - "scripts/**/*.py"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
