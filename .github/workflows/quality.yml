name: Product quality

on:
  pull_request:
  push:
    branches: [main, agent/max-product-overhaul]

permissions:
  contents: read

jobs:
  cross-platform:
    name: ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
        shell: bash

      - name: Validate dependency environment
        run: python -m pip check

      - name: Compile Python sources
        run: >-
          python -m py_compile
          server/repo_tools.py server/app_entry.py server/mcp_host_security.py server/notion_gateway.py server/notion_entry.py
          server/notion_agent_tools.py
          scripts/patch_notion_provider.py scripts/patch_native_notion_provider.py scripts/notion_doctor.py scripts/notion_profile.py
          scripts/native_notion_provider.py scripts/notion_setup_wizard.py scripts/tailscale_readiness.py
          scripts/product_doctor.py scripts/karox_admin.py scripts/karox_cli.py scripts/karox_stop.py scripts/karox_admin_entry.py scripts/karox_paths.py
          scripts/sitecustomize.py scripts/support_bundle.py scripts/support_bundle_entry.py scripts/rebrand_runtime.py
          scripts/test_notion_provider.py scripts/test_notion_profile.py scripts/test_tailscale_readiness.py
          scripts/test_path_migration.py scripts/test_runtime_rebrand.py scripts/test_product_doctor.py
          scripts/test_mcp_host_security.py scripts/test_notion_mcp_transport.py scripts/test_admin_cli.py scripts/test_app_entry.py
          scripts/test_tunnel_session_flow.py

      - name: Test provider generation
        shell: bash
        run: python scripts/test_notion_provider.py 2>&1 | tee provider-test.log

      - name: Test persistent Notion profile
        shell: bash
        run: python scripts/test_notion_profile.py 2>&1 | tee notion-profile-test.log

      - name: Test Tailscale readiness
        shell: bash
        run: python scripts/test_tailscale_readiness.py 2>&1 | tee tailscale-readiness-test.log

      - name: Test tunnel selection and parallel-session guard
        shell: bash
        run: python scripts/test_tunnel_session_flow.py 2>&1 | tee tunnel-session-test.log

      - name: Test path migration
        shell: bash
        run: PYTHONPATH=scripts python scripts/test_path_migration.py 2>&1 | tee path-migration-test.log

      - name: Test installed runtime rebrand
        shell: bash
        run: PYTHONPATH=scripts python scripts/test_runtime_rebrand.py 2>&1 | tee runtime-rebrand-test.log

      - name: Test installed layout doctor
        shell: bash
        run: python scripts/test_product_doctor.py 2>&1 | tee doctor-layout-test.log

      - name: Test MCP tunnel host security
        shell: bash
        run: python scripts/test_mcp_host_security.py 2>&1 | tee mcp-host-test.log

      - name: Test Notion MCP transport middleware
        shell: bash
        run: python scripts/test_notion_mcp_transport.py 2>&1 | tee mcp-transport-test.log

      - name: Run Notion provider doctor
        shell: bash
        run: python scripts/notion_doctor.py --root . 2>&1 | tee notion-doctor-test.log

      - name: Test admin CLI and redaction
        shell: bash
        run: python scripts/test_admin_cli.py 2>&1 | tee admin-test.log

      - name: Test hardened API runtime
        shell: bash
        run: python scripts/test_app_entry.py 2>&1 | tee runtime-test.log

      - name: Smoke-test public CLI metadata
        shell: bash
        run: |
          {
            python scripts/karox_cli.py version --json
            python scripts/karox_cli.py status --json
            python scripts/karox_cli.py stop --json
            python scripts/karox_cli.py doctor --json
          } 2>&1 | tee smoke-test.log

      - name: Validate generated launcher in Windows PowerShell 5.1
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python scripts/patch_notion_provider.py --platform powershell --source start.core.ps1 --output generated.windows.ps1 --root .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path 'generated.windows.ps1'))
          if ($bytes.Length -lt 3 -or $bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) { throw 'Generated launcher is missing UTF-8 BOM.' }
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'generated.windows.ps1'), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { Write-Error ($errors | Out-String); exit 1 }

      - name: Validate POSIX syntax
        if: runner.os != 'Windows'
        run: bash -n bootstrap.sh install.sh install.karox.sh start.sh start.core.sh

      - name: Parse PowerShell entrypoints with Windows PowerShell 5.1
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          $details = New-Object System.Collections.Generic.List[string]
          foreach ($file in @('bootstrap.ps1','install.ps1','install.karox.ps1','start.ps1','start.core.ps1','doctor.ps1','uninstall.ps1','scripts/install_guard.ps1')) {
            $path = Resolve-Path $file
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $details.Add("===== $file =====")
              foreach ($error in $errors) {
                $details.Add("line=$($error.Extent.StartLineNumber) column=$($error.Extent.StartColumnNumber) message=$($error.Message)")
                $details.Add("text=$($error.Extent.Text)")
              }
            }
          }
          $details | Set-Content -LiteralPath powershell-parser.log -Encoding UTF8
          if ($failed) { Write-Error ($details -join [Environment]::NewLine); exit 1 }

      - name: Upload matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            provider-test.log
            notion-profile-test.log
            tailscale-readiness-test.log
            path-migration-test.log
            runtime-rebrand-test.log
            doctor-layout-test.log
            mcp-host-test.log
            mcp-transport-test.log
            notion-doctor-test.log
            admin-test.log
            runtime-test.log
            smoke-test.log
            powershell-parser.log
            generated.windows.ps1
          if-no-files-found: ignore
