name: Product quality

on:
  pull_request:
  push:
    branches:
      - main
      - agent/max-product-overhaul

permissions:
  contents: read

jobs:
  cross-platform:
    name: ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
        shell: bash

      - name: Validate dependency environment
        run: python -m pip check

      - name: Compile Python sources
        run: >-
          python -m py_compile
          server/repo_tools.py
          server/app_entry.py
          server/notion_gateway.py
          server/notion_entry.py
          scripts/patch_notion_provider.py
          scripts/notion_doctor.py
          scripts/karox_admin.py
          scripts/karox_cli.py
          scripts/sitecustomize.py
          scripts/support_bundle.py
          scripts/test_notion_provider.py
          scripts/test_admin_cli.py
          scripts/test_app_entry.py

      - name: Test provider generation
        shell: bash
        run: python scripts/test_notion_provider.py 2>&1 | tee provider-test.log

      - name: Test admin CLI and redaction
        shell: bash
        run: python scripts/test_admin_cli.py 2>&1 | tee admin-test.log

      - name: Test hardened API runtime
        shell: bash
        run: python scripts/test_app_entry.py 2>&1 | tee runtime-test.log

      - name: Smoke-test public CLI metadata
        shell: bash
        run: |
          {
            python scripts/karox_cli.py version --json
            python scripts/karox_cli.py status --json
            python scripts/karox_cli.py doctor --json
          } 2>&1 | tee smoke-test.log

      - name: Validate POSIX syntax
        if: runner.os != 'Windows'
        run: bash -n bootstrap.sh install.sh start.sh start.core.sh

      - name: Parse PowerShell entrypoints
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @('bootstrap.ps1', 'install.ps1', 'start.ps1', 'start.core.ps1', 'doctor.ps1', 'uninstall.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$file has parser errors: $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }

      - name: Upload matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            provider-test.log
            admin-test.log
            runtime-test.log
            smoke-test.log
          if-no-files-found: ignore
