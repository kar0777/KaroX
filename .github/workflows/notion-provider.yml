name: Provider and release contracts

on:
  pull_request:
    paths:
      - "start.ps1"
      - "start.sh"
      - "start.core.ps1"
      - "start.core.sh"
      - "bootstrap.ps1"
      - "bootstrap.sh"
      - "install.ps1"
      - "install.sh"
      - "server/*.py"
      - "scripts/*.py"
      - "requirements.txt"
      - "VERSION"
      - "RELEASE_NOTES_v*.md"
      - ".github/workflows/*.yml"
  push:
    branches:
      - agent/notion-provider
      - agent/max-product-overhaul

jobs:
  source-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile product modules
        run: >-
          python -m py_compile
          server/repo_tools.py
          server/app_entry.py
          server/notion_gateway.py
          server/notion_entry.py
          scripts/patch_notion_provider.py
          scripts/notion_doctor.py
          scripts/karox_admin.py
          scripts/test_notion_provider.py
          scripts/test_admin_cli.py
          scripts/test_app_entry.py

      - name: Test provider transformations
        run: python scripts/test_notion_provider.py | tee notion-test.log

      - name: Test admin CLI
        run: python scripts/test_admin_cli.py | tee admin-test.log

      - name: Test hardened runtime
        run: python scripts/test_app_entry.py | tee runtime-test.log

      - name: Run Notion provider doctor
        run: python scripts/notion_doctor.py --root .

      - name: Run product doctor
        run: python scripts/karox_admin.py doctor --json > product-doctor.json

      - name: Validate POSIX scripts
        run: bash -n bootstrap.sh install.sh start.sh start.core.sh

      - name: Validate stable release metadata
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '[:space:]' < VERSION)" = "3.12.0"
          test -f RELEASE_NOTES_v3.12.0.md
          grep -F 'v3.12.0' bootstrap.ps1
          grep -F 'v3.12.0' bootstrap.sh
          grep -F 'REF_KIND="tags"' bootstrap.sh
          grep -F 'KAROX_NO_START' bootstrap.ps1
          grep -F 'KAROX_NO_START' bootstrap.sh
          grep -F 'karox dashboard' PRODUCT_GUIDE.md
          grep -F 'karox support' PRODUCT_GUIDE.md

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @('bootstrap.ps1', 'install.ps1', 'start.ps1', 'start.core.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$file has parser errors: $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }

      - name: Test release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-test
          git archive --format=zip --prefix=KaroX-v3.12.0/ -o dist-test/KaroX-v3.12.0.zip HEAD
          git archive --format=tar.gz --prefix=KaroX-v3.12.0/ -o dist-test/KaroX-v3.12.0.tar.gz HEAD
          test -s dist-test/KaroX-v3.12.0.zip
          test -s dist-test/KaroX-v3.12.0.tar.gz

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karox-product-diagnostics
          path: |
            notion-test.log
            admin-test.log
            runtime-test.log
            product-doctor.json
            dist-test/
