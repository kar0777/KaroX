name: Provider and release contracts

on:
  pull_request:
    paths:
      - "start.ps1"
      - "start.sh"
      - "start.core.ps1"
      - "start.core.sh"
      - "bootstrap.ps1"
      - "bootstrap.sh"
      - "install.ps1"
      - "install.sh"
      - "doctor.ps1"
      - "server/*.py"
      - "scripts/*.py"
      - "requirements.txt"
      - "VERSION"
      - "RELEASE_NOTES_v*.md"
      - ".github/workflows/*.yml"
  push:
    branches:
      - agent/notion-provider
      - agent/max-product-overhaul

jobs:
  source-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile product modules
        run: >-
          python -m py_compile
          server/repo_tools.py
          server/app_entry.py
          server/mcp_host_security.py
          server/notion_gateway.py
          server/notion_entry.py
          scripts/patch_notion_provider.py
          scripts/notion_doctor.py
          scripts/notion_profile.py
          scripts/product_doctor.py
          scripts/karox_admin.py
          scripts/karox_cli.py
          scripts/sitecustomize.py
          scripts/support_bundle.py
          scripts/test_notion_provider.py
          scripts/test_notion_profile.py
          scripts/test_product_doctor.py
          scripts/test_mcp_host_security.py
          scripts/test_notion_mcp_transport.py
          scripts/test_admin_cli.py
          scripts/test_app_entry.py

      - name: Test provider transformations
        run: python scripts/test_notion_provider.py | tee notion-test.log

      - name: Test persistent Notion profile
        run: python scripts/test_notion_profile.py | tee notion-profile-test.log

      - name: Test doctor layout resolution
        run: python scripts/test_product_doctor.py | tee doctor-layout-test.log

      - name: Test MCP tunnel host security
        run: python scripts/test_mcp_host_security.py | tee mcp-host-test.log

      - name: Test Notion MCP transport middleware
        run: python scripts/test_notion_mcp_transport.py | tee mcp-transport-test.log

      - name: Test admin CLI
        run: python scripts/test_admin_cli.py | tee admin-test.log

      - name: Test hardened runtime
        run: python scripts/test_app_entry.py | tee runtime-test.log

      - name: Run Notion provider doctor
        run: python scripts/notion_doctor.py --root .

      - name: Run product doctor
        run: python scripts/product_doctor.py --root . --json > product-doctor.json

      - name: Validate POSIX scripts
        run: bash -n bootstrap.sh install.sh start.sh start.core.sh

      - name: Validate stable release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          test -n "$VERSION_VALUE"
          test -f "RELEASE_NOTES_v${VERSION_VALUE}.md"
          grep -F "v${VERSION_VALUE}" bootstrap.ps1
          grep -F "v${VERSION_VALUE}" bootstrap.sh
          grep -F 'REF_KIND="tags"' bootstrap.sh
          grep -F 'KAROX_NO_START' bootstrap.ps1
          grep -F 'KAROX_NO_START' bootstrap.sh
          grep -F 'karox dashboard' PRODUCT_GUIDE.md
          grep -F 'karox support' PRODUCT_GUIDE.md
          grep -F 'karox notion setup' NOTION.md

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @('bootstrap.ps1', 'install.ps1', 'start.ps1', 'start.core.ps1', 'doctor.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$file has parser errors: $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }

      - name: Test release archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION_VALUE}"
          mkdir -p dist-test
          git archive --format=zip --prefix="KaroX-${TAG}/" -o "dist-test/KaroX-${TAG}.zip" HEAD
          git archive --format=tar.gz --prefix="KaroX-${TAG}/" -o "dist-test/KaroX-${TAG}.tar.gz" HEAD
          test -s "dist-test/KaroX-${TAG}.zip"
          test -s "dist-test/KaroX-${TAG}.tar.gz"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karox-product-diagnostics
          path: |
            notion-test.log
            notion-profile-test.log
            doctor-layout-test.log
            mcp-host-test.log
            mcp-transport-test.log
            admin-test.log
            runtime-test.log
            product-doctor.json
            dist-test/
